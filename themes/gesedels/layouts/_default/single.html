{{ define "name" }}
    {{ .Title }}
{{ end }}

{{ define "main" }}
    <article class="post">
        {{ partial "post-header.html" . }}
        {{ partial "post-body.html"   . }}

        <div class="post-footer">
            <ul class="post-footer-navigation">
                {{ with .PrevInSection }}
                    <li>
                        Previous: <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                    </li>
                {{ end }}

                {{ with .NextInSection }}
                    <li>
                        Next: <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                    </li>
                {{ end }}
            </ul>
        </div>
    </article>
{{ end }}
